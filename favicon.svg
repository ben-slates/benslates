<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff0033"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#050000"/>

  <!-- Subtle grid lines -->
  <path d="M0 32 H64 M32 0 V64" stroke="#330000" stroke-width="0.5" opacity="0.2"/>

  <!-- BS text -->
  <text x="50%" y="52%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="JetBrains Mono, monospace"
        font-size="28"
        fill="url(#g)"
        filter="url(#glow)"
        letter-spacing="2">
    BS
  </text>

  <!-- glitch accent -->
  <rect x="18" y="40" width="28" height="2" fill="#ff0033" opacity="0.2"/>
</svg>